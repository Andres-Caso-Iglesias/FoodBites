<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Truck Bites - Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="icon" th:href="@{/img/favicon.png}" type="image/png"/>
</head>
<body>
<a class="navbar-brand" th:href="@{/}">
    <img th:src="@{/img/truck_bites.jpg}" alt="logo Truck Bites" width="140" height="120">
</a>
<div class="container mt-5 text-center">
    <h1 class="mb-4">¡Ups! Algo salió mal</h1>
    <p th:text="'Error: ' + ${#httpServletResponse.status}"></p>
    <p th:if="${error}" th:text="${error}"></p>
    <p>No encontramos la página que buscas.</p>
    <p>Por favor, verifica la URL o vuelve a la página de inicio.</p>
    <a th:href="@{/}" class="btn btn-primary mt-3">Volver al Inicio</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
